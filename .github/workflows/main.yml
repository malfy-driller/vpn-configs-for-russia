name: Update Malfoy Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync-build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/igareck/vpn-configs-for-russia.git
          git fetch upstream

      - name: Sync WHITE-CIDR-RU-checked.txt from upstream
        run: |
          git checkout upstream/main -- WHITE-CIDR-RU-checked.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run subscription builder
        run: python build_sub.py

            - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add WHITE-CIDR-RU-checked.txt
          git add malfoy_subscription.txt
          git add malfoy_subscription_top.txt
          git add checked_results.txt

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Auto-update Malfoy subscription"
          git push
